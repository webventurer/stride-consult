<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <pattern id="quicksand" x="0" y="0" width="24" height="10" patternUnits="userSpaceOnUse">
      <path d="M0 5 Q6 2 12 5 Q18 8 24 5" stroke="#c9a06c" stroke-width="1.2" fill="none" opacity="0.5"/>
    </pattern>
    <pattern id="concrete" x="0" y="0" width="16" height="8" patternUnits="userSpaceOnUse">
      <rect width="16" height="8" fill="#94a3b8"/>
      <line x1="0" y1="4" x2="16" y2="4" stroke="#7c8ca0" stroke-width="0.5"/>
      <line x1="8" y1="0" x2="8" y2="4" stroke="#7c8ca0" stroke-width="0.5"/>
      <line x1="0" y1="4" x2="0" y2="8" stroke="#7c8ca0" stroke-width="0.5"/>
      <line x1="16" y1="4" x2="16" y2="8" stroke="#7c8ca0" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Left background -->
  <rect x="0" y="0" width="510" height="480" rx="12" fill="#f8f9fa"/>

  <!-- Right background -->
  <rect x="590" y="0" width="510" height="480" rx="12" fill="#f8f9fa"/>

  <!-- ==================== LEFT SIDE: VIBE CODING ==================== -->

  <text x="255" y="46" font-size="28" font-weight="700" fill="#dc2626" text-anchor="middle">Vibe coding</text>

  <!-- Quicksand ground -->
  <rect x="55" y="330" width="400" height="130" rx="4" fill="#e8d5b7"/>
  <rect x="55" y="330" width="400" height="130" rx="4" fill="url(#quicksand)"/>

  <!-- House - tilted, sinking deep -->
  <g transform="translate(255, 320) rotate(12) translate(-255, -320)">
    <rect x="180" y="240" width="150" height="130" rx="2" fill="#fecaca" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
    <polygon points="167,240 255,170 343,240" fill="#fca5a5" stroke="#ef4444" stroke-width="1.5"/>

    <!-- Window 1 - cracked -->
    <rect x="203" y="265" width="34" height="34" rx="1" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
    <line x1="203" y1="282" x2="237" y2="282" stroke="#ef4444" stroke-width="0.5"/>
    <line x1="220" y1="265" x2="220" y2="299" stroke="#ef4444" stroke-width="0.5"/>
    <path d="M210 268 L220 280 L213 292 L223 299" stroke="#dc2626" stroke-width="1.2" fill="none"/>

    <!-- Window 2 - cracked -->
    <rect x="268" y="265" width="34" height="34" rx="1" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
    <line x1="268" y1="282" x2="302" y2="282" stroke="#ef4444" stroke-width="0.5"/>
    <line x1="285" y1="265" x2="285" y2="299" stroke="#ef4444" stroke-width="0.5"/>
    <path d="M295 268 L288 278 L297 290" stroke="#dc2626" stroke-width="1" fill="none"/>

    <!-- Door -->
    <rect x="235" y="320" width="38" height="50" rx="2" fill="#fecdd3" stroke="#ef4444" stroke-width="1"/>
    <circle cx="266" cy="347" r="2.5" fill="#ef4444"/>
  </g>

  <!-- Quicksand overlay - swallows bottom of house -->
  <rect x="55" y="360" width="400" height="100" rx="4" fill="#e8d5b7" opacity="0.85"/>
  <rect x="55" y="360" width="400" height="100" rx="4" fill="url(#quicksand)" opacity="0.9"/>

  <!-- Bubbles -->
  <circle cx="170" cy="380" r="4" fill="none" stroke="#c9a06c" stroke-width="1" opacity="0.4"/>
  <circle cx="320" cy="390" r="3" fill="none" stroke="#c9a06c" stroke-width="1" opacity="0.3"/>
  <circle cx="220" cy="400" r="2.5" fill="none" stroke="#c9a06c" stroke-width="1" opacity="0.35"/>
  <circle cx="370" cy="375" r="3.5" fill="none" stroke="#c9a06c" stroke-width="1" opacity="0.3"/>

  <!-- ==================== RIGHT SIDE: AGENTIC ENGINEERING ==================== -->

  <text x="845" y="46" font-size="28" font-weight="700" fill="#16a34a" text-anchor="middle">Agentic engineering</text>

  <!-- Solid ground -->
  <rect x="640" y="400" width="410" height="60" rx="4" fill="#e2e8f0"/>

  <!-- Foundation — centred on 845 -->
  <rect x="695" y="376" width="300" height="24" rx="2" fill="url(#concrete)" stroke="#64748b" stroke-width="1"/>

  <!-- Foundation skill blocks — centred on 845 -->
  <rect x="715" y="352" width="80" height="22" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="755" y="367" font-size="10" font-weight="500" fill="#1e40af" text-anchor="middle">/craft</text>

  <rect x="805" y="352" width="80" height="22" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="845" y="367" font-size="10" font-weight="500" fill="#1e40af" text-anchor="middle">/linear</text>

  <rect x="895" y="352" width="80" height="22" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="935" y="367" font-size="10" font-weight="500" fill="#1e40af" text-anchor="middle">/commit</text>

  <!-- House — centred on 845 -->
  <g>
    <rect x="755" y="190" width="180" height="162" rx="2" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
    <polygon points="741,190 845,100 949,190" fill="#bbf7d0" stroke="#22c55e" stroke-width="1.5"/>

    <!-- Upper windows -->
    <rect x="785" y="145" width="32" height="28" rx="1" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
    <line x1="785" y1="159" x2="817" y2="159" stroke="#22c55e" stroke-width="0.5"/>
    <line x1="801" y1="145" x2="801" y2="173" stroke="#22c55e" stroke-width="0.5"/>

    <rect x="873" y="145" width="32" height="28" rx="1" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
    <line x1="873" y1="159" x2="905" y2="159" stroke="#22c55e" stroke-width="0.5"/>
    <line x1="889" y1="145" x2="889" y2="173" stroke="#22c55e" stroke-width="0.5"/>

    <!-- Lower windows -->
    <rect x="780" y="215" width="36" height="36" rx="1" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
    <line x1="780" y1="233" x2="816" y2="233" stroke="#22c55e" stroke-width="0.5"/>
    <line x1="798" y1="215" x2="798" y2="251" stroke="#22c55e" stroke-width="0.5"/>

    <rect x="874" y="215" width="36" height="36" rx="1" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
    <line x1="874" y1="233" x2="910" y2="233" stroke="#22c55e" stroke-width="0.5"/>
    <line x1="892" y1="215" x2="892" y2="251" stroke="#22c55e" stroke-width="0.5"/>

    <!-- Door -->
    <rect x="825" y="296" width="40" height="56" rx="2" fill="#d1fae5" stroke="#22c55e" stroke-width="1"/>
    <circle cx="858" cy="326" r="2.5" fill="#22c55e"/>
  </g>
</svg>
