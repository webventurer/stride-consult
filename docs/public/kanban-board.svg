<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" rx="12" fill="#f8f9fa"/>

  <!-- Column headers -->
  <text x="28" y="32" font-size="11" font-weight="600" fill="#6b7280">Backlog</text>
  <text x="188" y="32" font-size="11" font-weight="600" fill="#6b7280">To do</text>
  <text x="348" y="32" font-size="11" font-weight="600" fill="#6b7280">Doing</text>
  <text x="508" y="32" font-size="11" font-weight="600" fill="#6b7280">In Review</text>
  <text x="668" y="32" font-size="11" font-weight="600" fill="#6b7280">Waiting</text>
  <text x="828" y="32" font-size="11" font-weight="600" fill="#6b7280">Done</text>

  <!-- Status dots -->
  <circle cx="20" cy="28" r="4" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="180" cy="28" r="4" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="340" cy="28" r="4" fill="#f59e0b" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="500" cy="28" r="4" fill="#3b82f6" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="660" cy="28" r="4" fill="#8b5cf6" stroke="#8b5cf6" stroke-width="1.5"/>
  <circle cx="820" cy="28" r="4" fill="#22c55e" stroke="#22c55e" stroke-width="1.5"/>

  <!-- Column dividers -->
  <line x1="160" y1="12" x2="160" y2="308" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="320" y1="12" x2="320" y2="308" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="480" y1="12" x2="480" y2="308" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="640" y1="12" x2="640" y2="308" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="800" y1="12" x2="800" y2="308" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Backlog cards -->
  <rect x="12" y="48" width="136" height="72" rx="6" fill="white" filter="url(#shadow)"/>
  <text x="20" y="64" font-size="9" fill="#9ca3af">PG-201</text>
  <text x="20" y="80" font-size="11" font-weight="500" fill="#1f2937">Add CSV export to</text>
  <text x="20" y="94" font-size="11" font-weight="500" fill="#1f2937">analytics dashboard</text>
  <rect x="20" y="104" width="8" height="8" rx="2" fill="#e5e7eb"/>

  <rect x="12" y="128" width="136" height="72" rx="6" fill="white" filter="url(#shadow)"/>
  <text x="20" y="144" font-size="9" fill="#9ca3af">PG-215</text>
  <text x="20" y="160" font-size="11" font-weight="500" fill="#1f2937">Explore GraphQL</text>
  <text x="20" y="174" font-size="11" font-weight="500" fill="#1f2937">subscriptions</text>
  <rect x="20" y="184" width="8" height="8" rx="2" fill="#e5e7eb"/>

