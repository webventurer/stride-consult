  <rect x="332" y="48" width="136" height="72" rx="6" fill="white" filter="url(#shadow)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="340" y="64" font-size="9" fill="#9ca3af">PG-189</text>
  <text x="340" y="80" font-size="11" font-weight="500" fill="#1f2937">Add retry logic to</text>
  <text x="340" y="94" font-size="11" font-weight="500" fill="#1f2937">webhook delivery</text>
  <rect x="340" y="104" width="24" height="8" rx="2" fill="#fef3c7"/>
  <text x="344" y="111" font-size="6" fill="#d97706">API</text>
  <circle cx="454" cy="108" r="8" fill="#e0e7ff"/>
  <text x="451" y="112" font-size="8" font-weight="500" fill="#4f46e5">M</text>

