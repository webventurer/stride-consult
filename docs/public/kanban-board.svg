  <text x="660" y="64" font-size="9" fill="#9ca3af">PG-177</text>
  <text x="660" y="80" font-size="11" font-weight="500" fill="#1f2937">Migrate auth tokens</text>
  <text x="660" y="94" font-size="11" font-weight="500" fill="#1f2937">to new vault</text>
  <rect x="660" y="104" width="48" height="8" rx="2" fill="#fef3c7"/>
  <text x="664" y="111" font-size="6" fill="#d97706">blocked: DevOps</text>

  <!-- Done cards -->
  <rect x="812" y="48" width="136" height="72" rx="6" fill="white" filter="url(#shadow)" opacity="0.7"/>
  <text x="820" y="64" font-size="9" fill="#9ca3af">PG-170</text>
  <text x="820" y="80" font-size="11" font-weight="500" fill="#6b7280">Add user profile</text>
  <text x="820" y="94" font-size="11" font-weight="500" fill="#6b7280">photo upload</text>
  <circle cx="934" cy="108" r="8" fill="#dcfce7"/>
  <text x="930" y="112" font-size="8" fill="#16a34a">✓</text>

  <rect x="812" y="128" width="136" height="72" rx="6" fill="white" filter="url(#shadow)" opacity="0.7"/>
  <text x="820" y="144" font-size="9" fill="#9ca3af">PG-165</text>
  <text x="820" y="160" font-size="11" font-weight="500" fill="#6b7280">Extract email</text>
  <text x="820" y="174" font-size="11" font-weight="500" fill="#6b7280">validation service</text>
  <circle cx="934" cy="188" r="8" fill="#dcfce7"/>
  <text x="930" y="192" font-size="8" fill="#16a34a">✓</text>

  <rect x="812" y="208" width="136" height="72" rx="6" fill="white" filter="url(#shadow)" opacity="0.7"/>
  <text x="820" y="224" font-size="9" fill="#9ca3af">PG-160</text>
  <text x="820" y="240" font-size="11" font-weight="500" fill="#6b7280">Fix null pointer in</text>
  <text x="820" y="254" font-size="11" font-weight="500" fill="#6b7280">payment validation</text>
  <circle cx="934" cy="268" r="8" fill="#dcfce7"/>
  <text x="930" y="272" font-size="8" fill="#16a34a">✓</text>
