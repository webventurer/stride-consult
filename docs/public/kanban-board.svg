  <text x="180" y="160" font-size="11" font-weight="500" fill="#1f2937">Add rate limiting</text>
  <text x="180" y="174" font-size="11" font-weight="500" fill="#1f2937">to webhook endpoint</text>
  <rect x="180" y="184" width="24" height="8" rx="2" fill="#fef3c7"/>
