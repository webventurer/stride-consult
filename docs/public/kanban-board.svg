  <rect x="492" y="48" width="136" height="72" rx="6" fill="white" filter="url(#shadow)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="500" y="64" font-size="9" fill="#9ca3af">PG-185</text>
  <text x="500" y="80" font-size="11" font-weight="500" fill="#1f2937">Fix timezone in</text>
  <text x="500" y="94" font-size="11" font-weight="500" fill="#1f2937">scheduled reports</text>
  <rect x="500" y="104" width="20" height="8" rx="2" fill="#fce7f3"/>
  <text x="504" y="111" font-size="6" fill="#db2777">bug</text>
  <circle cx="614" cy="108" r="8" fill="#e0e7ff"/>
  <text x="611" y="112" font-size="8" font-weight="500" fill="#4f46e5">M</text>

  <rect x="492" y="128" width="136" height="72" rx="6" fill="white" filter="url(#shadow)"/>
  <text x="500" y="144" font-size="9" fill="#9ca3af">PG-192</text>
  <text x="500" y="160" font-size="11" font-weight="500" fill="#1f2937">Add dark mode to</text>
  <text x="500" y="174" font-size="11" font-weight="500" fill="#1f2937">settings page</text>
  <rect x="500" y="184" width="36" height="8" rx="2" fill="#dbeafe"/>
  <text x="504" y="191" font-size="6" fill="#3b82f6">frontend</text>

